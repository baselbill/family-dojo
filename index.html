function setParentTab(tab){window.parentTabState=tab;renderParent();}
function renderParent(){
  const tabState=window.parentTabState||'week';
  const kids=ST.members.filter(m=>!m.isParent);
  const total=ST.chores.length;
  const done=ST.chores.filter(c=>c.done).length;
  const pct=total>0?Math.round((done/total)*100):0;
  // Save scroll before full rebuild
  const prevScroll=document.querySelector('#sc-parent .p-content')?.scrollTop||0;

  let html=`<div class="p-layout">
    <div class="p-nav">
      <div class="p-nav-title">Parent Zone</div>
      <div class="pni ${tabState==='week'?'on':''}" onclick="setParentTab('week')">⚡ Daily Chores</div>
      <div class="pni ${tabState==='goals'?'on':''}" onclick="setParentTab('goals')">🎁 Rewards</div>
      <div class="pni ${tabState==='family'?'on':''}" onclick="setParentTab('family')">👨‍👩‍👧‍👦 Family</div>
      <div class="p-exit"><button onclick="show('home')">← Exit</button></div>
    </div>
    <div class="p-content">
      ${renderParentWeek(kids,total,done,pct)}
      ${renderParentGoals()}
      ${renderParentFamily()}
    </div>
  </div>`;
  document.getElementById('sc-parent').innerHTML=html;
  document.querySelectorAll('.ps').forEach(s=>s.classList.remove('on'));
  const active=document.getElementById('ps-'+tabState);
  if(active)active.classList.add('on');
  // Restore scroll position
  const pc=document.querySelector('#sc-parent .p-content');
  if(pc)pc.scrollTop=prevScroll;
}

function renderParentWeek(kids,total,done,pct){
  const weeklyStarsTotal=Object.values(ST.weeklyStars||{}).reduce((s,v)=>s+v,0);

  // ── Per-kid assigned chore lists (accordion) ─────────────────────
  if(!window._kExp)window._kExp={};
  let kidChoreHTML='';
  for(const kid of kids){
    const cls=CLASSES[kid.classId]||CLASSES.scout;
    const myChores=ST.chores.filter(c=>c.assignee===kid.id);
    const myDone=myChores.filter(c=>c.done).length;
    // Default: expanded
    const expanded=window._kExp[kid.id]!==false;
    const timeLabel=t=>t==='morning'?'☀️ AM':t==='evening'?'🌙 PM':'⏰';
    const schoolLabel=s=>s===true?'🏫':s===false?'🏖️':'📅';
    const timeCls=t=>t==='morning'?'cc-am':t==='evening'?'cc-pm':'';
    const schoolCls=s=>s===true?'cc-school':s===false?'cc-noschool':'';
    kidChoreHTML+=`<div class="kid-acc" style="border-left:3px solid ${cls.accent}30;margin-bottom:6px;">
      <div class="kid-acc-hdr" onclick="toggleKidSection('${kid.id}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${cls.accent};flex-shrink:0;"></div>
        <span style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:${cls.accent};">${escHtml(kid.name)}</span>
        <span style="font-size:10px;color:var(--text3);background:rgba(255,255,255,0.06);padding:2px 7px;border-radius:999px;">${myDone}/${myChores.length}</span>
        <button onclick="event.stopPropagation();openAddChoreModal('${kid.id}')" class="cc-add-btn">+ Add</button>
        <span style="font-size:11px;color:var(--text3);margin-left:2px;transition:transform 0.2s;${expanded?'':'transform:rotate(-90deg)'};">▾</span>
      </div>
      ${expanded?`<div class="kid-acc-body">
        ${myChores.length===0?`<div style="font-size:12px;color:var(--text3);padding:6px 12px 8px;">No chores yet — use + Add or 📚 Quest Library</div>`:''}
        ${myChores.map(c=>`<div class="li cc-row${c.done?' cc-done':''}" style="border-left:3px solid ${cls.accent}${c.done?'40':'88'};">
          <div class="cc-move-col">
            <button class="cc-move" onclick="event.stopPropagation();moveChore('${c.id}',-1)" title="Move up">▲</button>
            <button class="cc-move" onclick="event.stopPropagation();moveChore('${c.id}',1)" title="Move down">▼</button>
          </div>
          <span style="font-size:18px;flex-shrink:0;">${c.emoji}</span>
          <div style="flex:1;min-width:0;">
            <div class="cc-name${c.done?' cc-name-done':''}">${escHtml(c.name)}</div>
            <div class="cc-chips">
              <button class="cc ${timeCls(c.timeTag)}" onclick="event.stopPropagation();cycleChoreTime('${c.id}')" title="Time of day">${timeLabel(c.timeTag)}</button>
              <button class="cc ${schoolCls(c.schoolDay)}" onclick="event.stopPropagation();cycleChoreSchool('${c.id}')" title="School day filter">${schoolLabel(c.schoolDay)}</button>
            </div>
          </div>
          <span class="cc-pts">★${c.points}</span>
          <button onclick="event.stopPropagation();editChoreModal('${c.id}')" class="cc-edit" title="Edit chore">✎</button>
          ${kids.length>1?`<button onclick="event.stopPropagation();assignChoreToAll('${c.id}')" class="cc-all" title="Copy to all children">👥</button>`:''}
          <button onclick="event.stopPropagation();removeChore('${c.id}')" class="cc-del">×</button>
        </div>`).join('')}
      </div>`:''}
    </div>`;
  }

  // ── Activity log ──────────────────────────────────────────────────
  const actHTML=ST.history&&ST.history.length
    ?ST.history.slice(0,8).map(h=>{const mem=ST.members.find(x=>x.name===h.name);const acc=mem?(CLASSES[mem.classId]?.accent||'#a0a8c8'):'#a0a8c8';return `<div class="ar"><span class="ar-name" style="color:${acc};">${escHtml(h.name)}</span><span class="ar-task">${escHtml(h.chore)}</span><span class="ar-check">✓</span><span class="ar-time">${escHtml(h.time)}</span></div>`;}).join('')
    :'<div style="font-size:12px;color:var(--text3);padding:6px 0;">No activity yet.</div>';

  return `<div class="ps on" id="ps-week">
    <div class="ptitle">⚡ Daily Chores</div>
    <div class="psub">Assign chores to each hero then track them on the home screen</div>

    <div class="sgrid">
      <div class="stc"><div class="stn">${done}</div><div class="stl">Done Today</div></div>
      <div class="stc"><div class="stn">${pct}%</div><div class="stl">Completion</div></div>
      <div class="stc"><div class="stn">★${weeklyStarsTotal}</div><div class="stl">Week Stars</div></div>
    </div>

    <div class="af">
      <div class="af-title" style="display:flex;align-items:center;justify-content:space-between;">
        <span>📋 Assigned Chores</span>
        <div style="display:flex;gap:6px;">
          <button onclick="openQuestLibraryModal()" style="padding:4px 12px;border-radius:999px;border:1px solid var(--accent);background:rgba(0,229,255,0.08);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;">📚 Quest Library</button>
          <button onclick="openCustomChoreModal()" style="padding:4px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(20,25,58,0.5);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;">✎ Custom</button>
        </div>
      </div>
      ${kidChoreHTML}
    </div>

    <div class="af">
      <div class="af-title">📝 Today's Activity</div>
      ${actHTML}
    </div>
  </div>`;
}

function renderParentGoals(){
  const grandStars=totalStars();
  const grandPct=ST.grandStarTarget>0?Math.min(100,Math.round((grandStars/ST.grandStarTarget)*100)):0;
  const kids=ST.members.filter(m=>!m.isParent);

  // Weekly rewards
  let weeklyRewardHTML='';
  for(let i=0;i<3;i++){
    const r=ST.rewards[i];
    weeklyRewardHTML+=`<div class="reward-slot ${r?'filled':''}">
      <div class="rs-num" style="background:rgba(124,111,247,0.2);color:#a89bff;">${i+1}</div>
      <div style="flex:1;min-width:0;">
        ${r?`<div style="font-weight:600;font-size:13px;">${r.emoji} ${escHtml(r.text)}</div>`:'<div style="color:var(--text3);font-size:12px;">Empty slot</div>'}
      </div>
      ${r?`<button class="rs-clear" onclick="delReward('weekly',${i})">Clear</button>`:''}
    </div>`;
  }

  // Lucky draw prizes
  let drawPrizeHTML='';
  for(let i=0;i<3;i++){
    const r=(ST.luckyDraw.prizes||[])[i];
    drawPrizeHTML+=`<div class="reward-slot ${r?'filled':''}">
      <div class="rs-num" style="background:rgba(255,107,53,0.2);color:#ff9966;">${i+1}</div>
      <div style="flex:1;min-width:0;">
        ${r?`<div style="font-weight:600;font-size:13px;">${r.emoji} ${escHtml(r.text)}</div>`:'<div style="color:var(--text3);font-size:12px;">Empty slot</div>'}
      </div>
      ${r?`<button class="rs-clear" onclick="delReward('draw',${i})">Clear</button>`:''}
    </div>`;
  }
  const drawEntries=ST.luckyDraw.entries||{};
  const totalTickets=Object.values(drawEntries).reduce((s,n)=>s+n,0);
  const drawPoolHTML=kids.map(k=>`<div class="li" style="padding:8px 12px;">
    <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${escHtml(k.name)}</div>
    <div style="font-size:11px;color:var(--text2);">★ ${k.starBalance||0} available · 🎟 ${drawEntries[k.id]||0} tickets entered</div></div>
  </div>`).join('');
  const drawHistHTML=(ST.luckyDraw.history||[]).length?`<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 8px;">Draw History</div>`
    +(ST.luckyDraw.history||[]).slice(0,5).map(h=>`<div class="li" style="padding:8px 12px;">
    <div style="flex:1;"><div style="font-size:13px;font-weight:600;">🏆 ${escHtml(h.winnerName)} — ${h.prize.emoji} ${escHtml(h.prize.text)}</div>
    <div style="font-size:11px;color:var(--text2);">${h.date} · ${h.totalEntries} total tickets</div></div></div>`).join(''):'';

  // Weekly vote
  const vOpts=ST.weeklyVote?.options||[null,null,null];
  const vVotes=ST.weeklyVote?.votes||{};
  const vTally=[0,0,0];
  for(const v of Object.values(vVotes)){if(v>=0&&v<3)vTally[v]++;}
  let voteOptionsHTML='';
  for(let i=0;i<3;i++){
    const o=vOpts[i];
    voteOptionsHTML+=`<div class="reward-slot ${o?'filled':''}">
      <div class="rs-num" style="background:rgba(168,155,255,0.2);color:#a89bff;">${i+1}</div>
      <div style="flex:1;min-width:0;">
        ${o?`<div style="font-weight:600;font-size:13px;">${o.emoji} ${escHtml(o.text)}</div>`:'<div style="color:var(--text3);font-size:12px;">Empty slot</div>'}
      </div>
      ${o?`<span style="font-size:13px;font-weight:700;color:#a89bff;min-width:40px;text-align:right;">${vTally[i]} vote${vTally[i]!==1?'s':''}</span><button class="rs-clear" style="margin-left:6px;" onclick="delReward('vote',${i})">Clear</button>`:''}
    </div>`;
  }
  const vWhoVoted=kids.filter(k=>vVotes[k.id]!==undefined);
  const vPending=kids.filter(k=>vVotes[k.id]===undefined);

  // Grand rewards
  let grandRewardHTML='';
  for(let i=0;i<3;i++){
    const r=ST.grandRewards[i];
    grandRewardHTML+=`<div class="reward-slot ${r?'filled':''}">
      <div class="rs-num" style="background:rgba(255,215,0,0.2);color:var(--gold);">${i+1}</div>
      <div style="flex:1;min-width:0;">
        ${r?`<div style="font-weight:600;font-size:13px;">${r.emoji} ${escHtml(r.text)}</div>`:'<div style="color:var(--text3);font-size:12px;">Empty slot</div>'}
      </div>
      ${r?`<button class="rs-clear" onclick="delReward('grand',${i})">Clear</button>`:''}
    </div>`;
  }

  return `<div class="ps" id="ps-goals">
    <div class="ptitle">🎁 Goals & Rewards</div>
    <div class="psub">Configure rewards, the lucky draw, and weekly voting</div>

    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Weekly Completion Target</div>
      <div style="font-size:13px;display:flex;align-items:center;gap:8px;"><input type="number" value="${ST.threshold}" onchange="ST.threshold=parseInt(this.value);save();" style="width:60px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:rgba(20,25,58,0.6);color:var(--text);font-size:13px;"> % complete to unlock weekly reward</div>
    </div>

    <div class="af">
      <div class="af-title" style="color:#a89bff;">⚡ Weekly Rewards (at ${ST.threshold}%)</div>
      ${weeklyRewardHTML}
      <button class="bp" style="width:100%;margin-top:10px;" onclick="openRewardPicker('weekly')">+ Add Reward</button>
    </div>

    <div class="af">
      <div class="af-title" style="color:#a89bff;">🗳️ Weekly Vote</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px;">Set up to 3 options for kids to vote on from their quest screen. When votes are in, apply the winner as the weekly reward.</div>
      ${voteOptionsHTML}
      <button class="bp" style="width:100%;margin-top:10px;" onclick="openRewardPicker('vote')">+ Add Vote Option</button>
      <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 6px;">Status</div>
      ${vWhoVoted.length?`<div style="font-size:12px;color:var(--green);margin-bottom:4px;">✓ Voted: ${vWhoVoted.map(k=>escHtml(k.name)).join(', ')}</div>`:''}
      ${vPending.length?`<div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Waiting: ${vPending.map(k=>escHtml(k.name)).join(', ')}</div>`:''}
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button onclick="toggleVoting()" style="flex:1;padding:9px;border-radius:8px;border:1px solid rgba(168,155,255,0.4);background:${ST.weeklyVote?.active?'rgba(168,155,255,0.15)':'rgba(168,155,255,0.05)'};color:#a89bff;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;">
          ${ST.weeklyVote?.active?'⏹ Close Voting':'▶ Open Voting'}
        </button>
        <button onclick="applyVoteWinner()" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--green);background:rgba(52,211,153,0.08);color:var(--green);font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;">
          ✓ Apply Winner as Reward
        </button>
      </div>
    </div>

    <div class="af">
      <div class="af-title" style="color:#ff9966;">🎟️ Monthly Lucky Draw</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px;">Kids spend their earned star balance on tickets. More tickets = higher chance of winning. Stars are consumed when entering.</div>
      <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Prizes (winner draws one at random)</div>
      ${drawPrizeHTML}
      <button class="bp" style="width:100%;margin-top:10px;" onclick="openRewardPicker('draw')">+ Add Prize</button>
      <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 8px;">Current Entry Pool (${totalTickets} total tickets)</div>
      ${drawPoolHTML}
      <button onclick="runLuckyDraw()" style="width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#ff6b35,#ff9966);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;box-shadow:0 0 16px rgba(255,107,53,0.4);">🎰 Run the Draw!</button>
      ${drawHistHTML}
    </div>

    <div class="af">
      <div class="af-title" style="color:var(--gold);">👑 Grand Rewards (${grandPct}% • ${grandStars}/${ST.grandStarTarget}★)</div>
      ${grandRewardHTML}
      <button class="bp" style="width:100%;margin-top:10px;" onclick="openRewardPicker('grand')">+ Add Reward</button>
      <div style="font-size:11px;color:var(--text2);margin-top:8px;display:flex;align-items:center;gap:8px;">Grand target: <input type="number" value="${ST.grandStarTarget}" onchange="ST.grandStarTarget=parseInt(this.value);save();" style="width:80px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:rgba(20,25,58,0.6);color:var(--text);font-size:12px;"> cumulative XP</div>
    </div>

    <div class="af">
      <div class="af-title">📖 Reward Library</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:10px;">Your saved custom rewards — pick from these when assigning rewards to tiers.</div>
      ${(ST.rewardLibrary||[]).length===0?'<div style="color:var(--text3);font-size:12px;padding:4px 0;">No saved rewards yet. Add a custom reward using any "+ Add" button above.</div>':''}
      ${(ST.rewardLibrary||[]).map((r,i)=>`<div class="reward-slot filled" style="margin-bottom:6px;">
        <div style="font-size:20px;flex-shrink:0;">${r.emoji}</div>
        <div style="flex:1;font-size:13px;font-weight:600;">${escHtml(r.text)}</div>
        <button class="rs-clear" onclick="deleteRewardLib(${i})">Remove</button>
      </div>`).join('')}
      <div style="display:flex;gap:8px;align-items:center;margin-top:10px;">
        <input id="rl-emoji" type="text" placeholder="🎁" style="width:52px;padding:8px;text-align:center;font-size:20px;border:1px solid var(--border);border-radius:8px;background:rgba(20,25,58,0.6);color:var(--text);">
        <input id="rl-text" type="text" placeholder="Add to reward library…" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(20,25,58,0.6);color:var(--text);font-size:13px;" onkeydown="if(event.key==='Enter')addToRewardLibDirect();">
        <button onclick="addToRewardLibDirect()" style="padding:8px 14px;border-radius:8px;border:none;background:rgba(0,229,255,0.15);border:1px solid var(--accent);color:var(--accent);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;">Save</button>
      </div>
    </div>
  </div>`;
}

function renderParentFamily(){
  const kids=ST.members.filter(m=>!m.isParent);
  const parents=ST.members.filter(m=>m.isParent);

  // Members list
  let memberHTML='';
  for(const kid of kids){
    const cls=CLASSES[kid.classId]||CLASSES.scout;
    const age=calcAge(kid.dob);
    const level=levelFromXp(kid.xp||0);
    const stars=(ST.weeklyStars||{})[kid.id]||0;
    memberHTML+=`<div class="li" style="background:linear-gradient(90deg,${cls.accent}10,transparent);border-left:3px solid ${cls.accent};">
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;">${escHtml(kid.name)}</div>
        <div style="font-size:11px;color:var(--text2);">${age} years · ${cls.name} · L${level} · ★${stars} this week</div>
      </div>
      <button class="bp" style="padding:5px 12px;font-size:11px;" onclick="editKid('${kid.id}')">Edit</button>
      <button style="padding:5px 10px;font-size:11px;border-radius:8px;border:1px solid rgba(255,200,0,0.4);background:rgba(255,200,0,0.08);color:var(--gold);cursor:pointer;font-family:inherit;" onclick="resetKidXp('${kid.id}','${escHtml(kid.name)}')">↺ XP</button>
      <button class="bd" style="padding:5px 12px;font-size:11px;" onclick="delKid('${kid.id}')">Remove</button>
    </div>`;
  }

  // Parent list
  let parentHTML=parents.map(p=>`<div class="li"><span>${escHtml(p.name)}</span> (parent)</div>`).join('');

  return `<div class="ps" id="ps-family">
    <div class="ptitle">👨‍👩‍👧‍👦 Family & Settings</div>
    <div class="psub">Manage family members and preferences</div>

    <div class="af">
      <div class="af-title">🧒 Family Members</div>
      ${memberHTML}
      <button class="bp" style="width:100%;margin-top:10px;" onclick="addKidModal()">+ Add Child</button>
    </div>

    <div class="af">
      <div class="af-title">⚙ Settings</div>
      <label class="fl">Task Word (default: Quest)</label>
      <input type="text" value="${ST.taskWord||'Quest'}" onchange="ST.taskWord=this.value;save();" class="fi" style="margin-bottom:12px;">

      <label class="fl">Sound Effects</label>
      <div style="display:flex;gap:10px;margin-bottom:12px;">
        <label><input type="checkbox" ${ST.soundEnabled?'checked':''} onchange="ST.soundEnabled=this.checked;save();"> Enable chime sound</label>
      </div>

      <label class="fl">Change PIN</label>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
        <input id="pin-field" type="password" value="${ST.pin}" maxlength="4" onchange="ST.pin=this.value;save();" class="fi" style="flex:1;margin-bottom:0;" placeholder="4-digit PIN">
        <button onclick="const f=document.getElementById('pin-field');f.type=f.type==='password'?'text':'password';this.textContent=f.type==='password'?'👁️ Show':'🙈 Hide';" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(20,25,58,0.5);color:var(--text2);cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;font-family:inherit;">👁️ Show</button>
      </div>

      <label class="fl">Voice Selection</label>
      <select id="voice-sel" class="fs" onchange="selVoice=(voices[parseInt(this.value)]||null);localStorage.setItem('fdvoice',this.value);" style="margin-bottom:16px;">
        <option value="-1">Default System Voice</option>
        ${voices.map((v,i)=>`<option value="${i}" ${selVoice===v?'selected':''}>${v.name}</option>`).join('')}
      </select>

      <button class="bd" style="width:100%;margin-top:12px;" onclick="if(confirm('Reset all chores to not done today?')){ST.chores.forEach(c=>{c.done=false;c.chestRolled=false;});save();renderParent();}">🔄 Reset Today's Chores</button>
    </div>

    <div class="af">
      <div class="af-title">🌴 Holiday Mode</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px;">Streaks are frozen, and each child gets a rotating set of Travel Quests from the categories you choose below.</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">

function saveChoreEdit(id){
  const c=ST.chores.find(x=>x.id===id);if(!c)return;

  if(!name){alert('Please enter a chore name.');return;}

  c.emoji=chars.length>0?chars[0]:c.emoji;
  c.name=name;
  c.desc=(document.getElementById('ec-desc')?.value||'').trim();
  c.points=Math.max(1,parseInt(document.getElementById('ec-pts')?.value)||c.points);
  save();document.getElementById('modal-host').innerHTML='';renderParent();

function assignChoreToAll(id){
  const c=ST.chores.find(x=>x.id===id);if(!c)return;
  const others=ST.members.filter(m=>!m.isParent&&m.id!==c.assignee);
  if(!others.length){alert('No other children to assign to.');return;}
  let added=0;
  for(let i=0;i<others.length;i++){
    const kid=others[i];
    if(ST.chores.find(x=>x.assignee===kid.id&&x.name===c.name))continue;
    ST.chores.push({id:'ch'+Date.now()+i+Math.random().toString(36).slice(2,6),name:c.name,desc:c.desc||'',emoji:c.emoji,assignee:kid.id,points:c.points,done:false,timeTag:c.timeTag||'any',schoolDay:c.schoolDay===undefined?null:c.schoolDay,chestRolled:false});
    added++;
  }
  if(added===0){alert('All other children already have this chore.');return;}
  save();renderParent();
}
function moveChore(id,dir){
  const myIdx=ST.chores.findIndex(x=>x.id===id);if(myIdx<0)return;
  const assignee=ST.chores[myIdx].assignee;
  const kidIdx=ST.chores.map((x,i)=>x.assignee===assignee?i:-1).filter(i=>i>=0);
  const pos=kidIdx.indexOf(myIdx);
  const newPos=pos+dir;
  if(newPos<0||newPos>=kidIdx.length)return;
  const otherIdx=kidIdx[newPos];
  [ST.chores[myIdx],ST.chores[otherIdx]]=[ST.chores[otherIdx],ST.chores[myIdx]];
  save();renderParent();
}

function acSubmitCustom(){
  const kidId=window._acKidId;if(!kidId)return;

  const desc=(document.getElementById('ac-desc')||{}).value?.trim()||'';
  const customEmojiEl=document.getElementById('ac-custom-emoji');
  const chars=[...(customEmojiEl?customEmojiEl.value.trim():'')];
  const emoji=(chars.length>0?chars[0]:'')||window._acEmoji||'✅';
  const stars=window._acStars||1;
  const pts=Math.min(3,Math.max(1,stars));

      <button onclick="ccSubmit()" style="width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,#0891b2,var(--accent));color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;">Add Chore</button>
      <button style="width:100%;padding:9px;margin-top:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;" onclick="document.getElementById('modal-host').innerHTML='';">Cancel</button>
    </div>
  </div>`;
}
function ccSubmit(){
  const name=(document.getElementById('cc-name')||{}).value?.trim()||'';
  if(!name){alert('Please enter a chore name.');return;}
  const kidId=window._ccKidId;if(!kidId)return;
  const desc=(document.getElementById('cc-desc')||{}).value?.trim()||'';
  const customEmojiEl=document.getElementById('cc-custom-emoji');
  const chars=[...(customEmojiEl?customEmojiEl.value.trim():'')];
  const emoji=(chars.length>0?chars[0]:'')||window._ccEmoji||'✅';
  const stars=window._ccStars||1;
  const pts=Math.min(3,Math.max(1,stars));
  ST.chores.push({id:'ch'+Date.now(),name,desc,emoji,assignee:kidId,points:pts,done:false});
  if(!ST.customChores.find(c=>c.n===name)){
    ST.customChores.push({e:emoji,n:name,d:desc,s:pts,a:'Custom'});
  }
  save();renderParent();
  window._ccKidId=null;window._ccEmoji=null;window._ccStars=null;
  document.getElementById('modal-host').innerHTML='';
}

function togChore(choreId){
  const c=ST.chores.find(x=>x.id===choreId);if(!c)return;
  const m=ST.members.find(x=>x.id===c.assignee);if(!m)return;
  if(!c.done){
    c.done=true;
    const oldLevel=levelFromXp(m.xp||0);
    m.xp=(m.xp||0)+c.points;
    m.starBalance=(m.starBalance||0)+c.points;
    const newLevel=levelFromXp(m.xp);
    if(!ST.weeklyStars[c.assignee])ST.weeklyStars[c.assignee]=0;
    ST.weeklyStars[c.assignee]+=c.points;
    ST.monthlyStarsAccum=(ST.monthlyStarsAccum||0)+c.points;
    const tod2=dateStr();
    if(!ST.dailyHistory[c.assignee])ST.dailyHistory[c.assignee]={};
    ST.dailyHistory[c.assignee][tod2]=(ST.dailyHistory[c.assignee][tod2]||0)+1;
    if(!ST.cumulativeStars[c.assignee])ST.cumulativeStars[c.assignee]=0;
    ST.cumulativeStars[c.assignee]+=c.points;
    if(!ST.completedCount[c.assignee])ST.completedCount[c.assignee]=0;
    ST.completedCount[c.assignee]++;
    ST.history.unshift({name:m.name,chore:c.name,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),kidId:c.assignee,date:tod2});
    if(ST.history.length>100)ST.history.pop();
    playChime();
    save();
  } else {
    c.done=false;
    m.xp=Math.max(0,(m.xp||0)-c.points);
    m.starBalance=Math.max(0,(m.starBalance||0)-c.points);
    if(ST.weeklyStars[c.assignee])ST.weeklyStars[c.assignee]=Math.max(0,ST.weeklyStars[c.assignee]-c.points);
    ST.monthlyStarsAccum=Math.max(0,(ST.monthlyStarsAccum||0)-c.points);
    save();
  }
  renderParent();
}

function buildStarfield(kidId,clsAccent,weeks){
  weeks=weeks||8;
  const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today=new Date();
  // Align to Monday of current week
  const dow=(today.getDay()+6)%7; // 0=Mon…6=Sun
  const mondayThisWeek=new Date(today);
  mondayThisWeek.setDate(today.getDate()-dow);
  mondayThisWeek.setHours(12,0,0,0);
  // Start Monday (weeks-1) weeks ago
  const startDate=new Date(mondayThisWeek);
  startDate.setDate(mondayThisWeek.getDate()-(weeks-1)*7);
  const todayNoon=new Date();todayNoon.setHours(23,59,59,0);

  let html='<div class="starfield-wrap"><div style="display:flex;flex-direction:column;gap:3px;">';
  for(let d=0;d<7;d++){
    html+='<div style="display:flex;align-items:center;gap:3px;">';
    html+=`<span style="font-size:9px;color:var(--text3);width:22px;text-align:right;flex-shrink:0;font-weight:600;">${DAYS[d]}</span>`;
    for(let w=0;w<weeks;w++){
      const cellDate=new Date(startDate);
      cellDate.setDate(startDate.getDate()+w*7+d);
      const ds=dateStr(cellDate);
      const isFuture=cellDate>todayNoon;
      const count=isFuture?-1:((ST.dailyHistory[kidId]||{})[ds]||0);
      let bg,shadow,ttip;
      if(isFuture){bg='rgba(255,255,255,0.02)';shadow='none';ttip='';}
      else if(count===0){bg='rgba(255,255,255,0.06)';shadow='none';ttip=ds+': no quests';}
      else if(count===1){bg=clsAccent+'66';shadow='0 0 5px '+clsAccent+'44';ttip=ds+': 1 quest';}
      else if(count<=3){bg=clsAccent+'aa';shadow='0 0 7px '+clsAccent+'66';ttip=ds+': '+count+' quests';}
      else{bg=clsAccent+'ee';shadow='0 0 10px '+clsAccent+'99';ttip=ds+': '+count+' quests!';}
      html+=`<div style="width:12px;height:12px;border-radius:3px;flex-shrink:0;background:${bg};box-shadow:${shadow};" title="${ttip}"></div>`;
    }
    html+='</div>';
  }
  html+='</div>';
  // Legend
  html+=`<div class="sf-legend">
    <div style="display:flex;align-items:center;gap:4px;"><div class="sf-legend-dot" style="background:rgba(255,255,255,0.08);"></div><span>None</span></div>
    <div style="display:flex;align-items:center;gap:4px;"><div class="sf-legend-dot" style="background:${clsAccent}66;box-shadow:0 0 4px ${clsAccent}44;"></div><span>1</span></div>
    <div style="display:flex;align-items:center;gap:4px;"><div class="sf-legend-dot" style="background:${clsAccent}aa;box-shadow:0 0 6px ${clsAccent}66;"></div><span>2–3</span></div>
    <div style="display:flex;align-items:center;gap:4px;"><div class="sf-legend-dot" style="background:${clsAccent}ee;box-shadow:0 0 8px ${clsAccent}99;"></div><span>4+</span></div>
  </div></div>`;
  return html;
}

function renderHeroProfile(kidId){
  const kid=ST.members.find(m=>m.id===kidId);if(!kid)return;
  const cls=CLASSES[kid.classId]||CLASSES.scout;
  const prog=xpProgress(kid.xp||0);
  const rank=rankFor(kid.classId,prog.level);
  const petIcon=petDisplay(kid);
  const streak=(ST.streaks[kidId]||{}).current||0;
  const bestStreak=(ST.streaks[kidId]||{}).best||0;
  const cumStars=(ST.cumulativeStars[kidId]||0);
  const doneCount=(ST.completedCount[kidId]||0);
  const kidChests=(ST.pendingChests[kidId]||[]);
  const verse=V[(dayOfYear()-1)%V.length];
  // Badge grid
  const earnedIds=ST.badges[kidId]||[];
  const badgeGridHTML=BADGES.map(b=>{
    const ok=earnedIds.includes(b.id);
    return `<div class="badge-card ${ok?'badge-earned':'badge-locked'}" title="${escHtml(ok?b.name+' — '+b.desc:'Locked: '+b.desc)}">
      <div class="badge-icon">${b.emoji}</div>
      <div class="badge-card-name">${ok?escHtml(b.name):'???'}</div>
    </div>`;
  }).join('');

  // Top quests from history
  const myHistory=(ST.history||[]).filter(h=>h.kidId===kidId);
  const choreCounts={};
  const choreEmoji={};
  for(const h of myHistory){
    choreCounts[h.chore]=(choreCounts[h.chore]||0)+1;
    if(!choreEmoji[h.chore]){
      const ch=ST.chores.find(c=>c.assignee===kidId&&c.name===h.chore);
      if(ch)choreEmoji[h.chore]=ch.emoji;
    }
  }
  const topQuests=Object.entries(choreCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const medals=['🥇','🥈','🥉'];
  const topQuestHTML=topQuests.length
    ?topQuests.map(([name,cnt],i)=>`<div class="tq-row">
      <span class="tq-medal">${medals[i]||'•'}</span>
      <span style="font-size:16px;flex-shrink:0;">${choreEmoji[name]||'✅'}</span>
      <span class="tq-name">${escHtml(name)}</span>
      <span class="tq-count">${cnt}×</span>
    </div>`).join('')
    :`<div style="font-size:12px;color:var(--text3);padding:6px 0;">Complete some quests and they'll appear here!</div>`;

  const starfield=buildStarfield(kidId,cls.accent,8);

  const host=document.getElementById('modal-host');
  host.innerHTML=`<div class="profile-bg" onclick="if(event.target.classList.contains('profile-bg'))closeHeroProfile();">
    <div class="profile-modal">

      <!-- Close -->
      <button class="profile-close-btn" onclick="closeHeroProfile();">✕</button>

      <!-- Banner -->
      <div class="profile-banner" style="background:linear-gradient(180deg,${cls.accent}28 0%,${cls.accent}08 60%,transparent 100%);">
        <div class="profile-pet-display">${petIcon}</div>
        <div class="profile-hero-name" style="color:${cls.accent2};">${escHtml(kid.name)}</div>
        <div class="profile-rank-row">
          <span class="profile-rank-dec" style="color:${cls.accent};">✦ ✦</span>
          <span class="profile-rank-text" style="color:${cls.accent};">${rank.name.toUpperCase()}</span>
          <span class="profile-rank-dec" style="color:${cls.accent};">✦ ✦</span>
        </div>
        <div class="profile-next-rank">
          ${rank.next
            ?`Level ${prog.level} · Next rank: <span style="color:${cls.accent};">${escHtml(rank.next)}</span> at Lv.${rank.nextLvl}`
            :`<span style="color:${cls.accent};">✦ Maximum Rank Achieved ✦</span>`}
        </div>
        <div class="profile-xp-bar">
          <div class="profile-xp-fill" style="width:${prog.pct}%;background:linear-gradient(90deg,${cls.accent2},${cls.accent});box-shadow:0 0 8px ${cls.accent};"></div>
        </div>
        <button class="profile-quest-btn" style="background:linear-gradient(135deg,${cls.accent2},${cls.accent});color:#0a0e1f;box-shadow:0 0 20px ${cls.accent}66;" onclick="closeHeroProfile();openQuests('${kidId}');">
          ▶ Start Today's Quests
        </button>
        ${kidChests.length?`<button class="profile-chest-btn" style="border-color:${CHEST_TYPES.find(x=>x.id===kidChests[kidChests.length-1].type).color}55;" onclick="closeHeroProfile();const m=ST.members.find(x=>x.id==='${kidId}');if(m)showChestOverlay(m,ST.pendingChests['${kidId}'][ST.pendingChests['${kidId}'].length-1]);">
          📦 Open ${kidChests.length===1?'Your Chest':'Chests ('+kidChests.length+')'}!
        </button>`:''}
      </div>

      <!-- Stats strip -->
      <div class="profile-stat-strip">
        <div class="profile-stat-pill">
          <div class="psp-val" style="color:var(--gold);">★ ${cumStars}</div>
          <div class="psp-lbl">Total Stars</div>
        </div>
        <div class="profile-stat-pill">
          <div class="psp-val" style="color:#ff9944;">${streak>0?'🔥'+streak:'—'}</div>
          <div class="psp-lbl">Streak${bestStreak>0?' · Best '+bestStreak:''}</div>
        </div>
        <div class="profile-stat-pill">
          <div class="psp-val" style="color:${cls.accent};">🏆 ${prog.level}</div>
          <div class="psp-lbl">Level</div>
        </div>
        <div class="profile-stat-pill">
          <div class="psp-val" style="color:var(--green);">✅ ${doneCount}</div>
          <div class="psp-lbl">Done</div>
        </div>
      </div>

      <!-- Scripture of the Day -->
      <div class="profile-section">
        <div class="profile-section-title">✝ Today's Word</div>
        <div class="verse-overlay" style="margin-top:8px;">
          <div class="verse-overlay-text">"${escHtml(verse.t)}"</div>
          <div class="verse-overlay-ref">— ${escHtml(verse.r)}</div>
        </div>
      </div>

      <!-- The Starfield -->
      <div class="profile-section">
        <div class="profile-section-title">
          <span>✦ The Starfield</span>
          <span style="font-size:10px;color:var(--text3);font-family:'Inter',sans-serif;">Last 8 weeks</span>
        </div>
        <div class="profile-section-sub">Every quest lights a star</div>
        ${starfield}
      </div>

      <!-- Top Quests -->
      <div class="profile-section">
        <div class="profile-section-title">🏅 Top Quests</div>
        <div class="profile-section-sub">Your most-completed missions</div>
        ${topQuestHTML}
      </div>

      <!-- Badges -->
      <div class="profile-section" style="margin-bottom:32px;">
        <div class="profile-section-title">🏆 Badges</div>
        <div class="profile-section-sub">${earnedIds.length} / ${BADGES.length} unlocked</div>
        <div class="badge-grid">${badgeGridHTML}</div>
      </div>

    </div>
  </div>`;
}

function makeStars(){const g=document.getElementById('stars');if(!g)return;for(let i=0;i<60;i++){const x=(i*73)%1200;const y=(i*47+13)%900;const r=(i%3)*0.4+0.4;const o=((i*7)%10)/10*0.6+0.2;const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);c.setAttribute('fill','#fff');c.setAttribute('opacity',o);g.appendChild(c);}}

load();
makeStars();
chkDay();chkWeek();chkMonth();
document.addEventListener('visibilitychange',()=>{if(!document.hidden){chkDay();chkWeek();chkMonth();}});
if(window.speechSynthesis)loadVoices();
show('home');
