<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family Dojo">
<title>Family Dojo — Hero Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0e1f; --bg2:#14193a; --bg3:#1a2147; --bg4:#242a5e;
    --card:rgba(20,25,58,0.7); --card2:rgba(26,33,71,0.85);
    --border:rgba(255,255,255,0.08); --border2:rgba(0,229,255,0.25);
    --text:#e8ecff; --text2:#a0a8c8; --text3:#6a7090;
    --accent:#00e5ff; --accent2:#67e8f9;
    --gold:#ffd700; --gold2:#fbbf24;
    --green:#34d399; --green2:#10b981;
    --red:#f04060; --pink:#ff3d6e;
    --radius:14px; --radius-sm:10px;
    --shadow:0 4px 20px rgba(0,0,0,0.4);
    --shadow-lg:0 8px 32px rgba(0,0,0,0.6);
  }
  html,body{margin:0;padding:0;background:#050818;font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
  body{background:radial-gradient(ellipse at top,#14193a 0%,#0a0e1f 60%,#050818 100%);background-attachment:fixed;}
  h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;font-weight:600;}
  button{font-family:inherit;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);}
  ::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.25);border-radius:999px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(0,229,255,0.5);}
  @keyframes questFlash{0%{background:rgba(20,25,58,0.6);}40%{background:rgba(52,211,153,0.25);transform:translateX(2px);}100%{background:rgba(20,25,58,0.6);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
  @keyframes levelUp{0%{transform:scale(0.5);opacity:0;}50%{transform:scale(1.15);opacity:1;}100%{transform:scale(1);opacity:1;}}
  @keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  @keyframes confetti{0%{opacity:1;transform:scale(0.3) translateY(0) rotate(0);}100%{opacity:0;transform:scale(1.6) translateY(-100px) rotate(180deg);}}

  .sc{display:none;}.sc.on{display:block;}
  .starry-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

  /* Header */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid rgba(0,229,255,0.15);position:relative;z-index:2;}
  .hdr-l{display:flex;align-items:center;gap:14px;}
  .hdr-logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#00e5ff,#ff3d6e);display:flex;align-items:center;justify-content:center;font-family:serif;font-size:24px;color:#0a0e1f;box-shadow:0 0 24px rgba(0,229,255,0.4);}
  .hdr-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;letter-spacing:0.5px;}
  .hdr-title em{color:var(--accent);font-style:italic;}
  .hdr-date{font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
  .hdr-r{display:flex;align-items:center;gap:12px;}
  .star-badge{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid rgba(255,215,0,0.25);border-radius:999px;background:rgba(255,215,0,0.05);}
  .star-badge .s{color:var(--gold);font-size:14px;}
  .star-badge .v{font-size:13px;font-weight:600;}
  .star-badge .l{font-size:11px;color:var(--text2);}
  .btn-parents{padding:9px 16px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);color:var(--text);font-size:12px;font-weight:500;letter-spacing:0.5px;cursor:pointer;transition:all 0.15s;}
  .btn-parents:hover{background:rgba(0,229,255,0.1);border-color:var(--accent);}

  /* Verse */
  .verse{margin:14px 28px 0;padding:14px 20px;border-left:2px solid var(--gold);background:linear-gradient(90deg,rgba(255,215,0,0.08),transparent);display:flex;align-items:center;gap:16px;border-radius:0 8px 8px 0;}
  .verse-tag{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;min-width:130px;}
  .verse-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:#f0eccc;flex:1;line-height:1.4;}
  .verse-ref{font-size:11px;color:var(--gold);font-weight:600;}
  .verse-aud{padding:6px 12px;border-radius:999px;background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.4);color:var(--gold);font-size:11px;font-weight:600;cursor:pointer;}

  /* Birthday */
  .bday{margin:12px 28px 0;background:linear-gradient(135deg,rgba(255,61,110,0.15),rgba(255,215,0,0.1));border:1px solid var(--pink);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px;}
  .bday-emoji{font-size:30px;}
  .bday-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--pink);font-weight:600;}
  .bday-sub{font-size:11px;color:var(--text2);margin-top:2px;}

  /* Goals */
  .goals-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:14px 28px 0;}
  .goal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;backdrop-filter:blur(10px);position:relative;overflow:hidden;}
  .goal.weekly{border-color:rgba(124,111,247,0.3);}
  .goal.monthly{border-color:rgba(106,138,255,0.3);}
  .goal.grand{border-color:rgba(255,215,0,0.3);}
  .goal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .goal.weekly::before{background:linear-gradient(90deg,transparent,#7c6ff7,transparent);}
  .goal.monthly::before{background:linear-gradient(90deg,transparent,#6a8aff,transparent);}
  .goal.grand::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .goal-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
  .goal.weekly .goal-tag{color:#a89bff;}
  .goal.monthly .goal-tag{color:#8aacff;}
  .goal.grand .goal-tag{color:var(--gold);}
  .goal-rewards{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0;}
  .reward-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:3px 9px;font-size:11px;font-weight:600;}
  .days-row{display:flex;gap:4px;margin:8px 0 6px;}
  .day-dot{flex:1;text-align:center;}
  .dl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;margin-bottom:3px;}
  .dc{width:26px;height:26px;border-radius:7px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid var(--border);color:var(--text3);background:rgba(0,0,0,0.3);}
  .day-dot.filled .dc{background:linear-gradient(135deg,#7c6ff7,#34d399);border-color:var(--green);color:#fff;}
  .day-dot.today .dc{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08);}
  .bar-track{height:6px;background:rgba(0,0,0,0.4);border-radius:999px;overflow:hidden;border:1px solid var(--border);}
  .bar-fill{height:100%;border-radius:999px;transition:width 0.5s ease;}
  .goal.weekly .bar-fill{background:linear-gradient(90deg,#7c6ff7,#34d399);}
  .goal.monthly .bar-fill{background:linear-gradient(90deg,#4a6adf,#8aacff);}
  .goal.grand .bar-fill{background:linear-gradient(90deg,var(--gold2),var(--gold));}
  .goal-meta{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--text2);font-weight:600;}
  .goal-unlocked{margin-top:8px;padding:6px 10px;border-radius:8px;background:rgba(52,211,153,0.1);border:1px solid var(--green);font-size:11px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:6px;}

  /* Lucky Draw card */
  .goal.draw{border-color:rgba(255,107,53,0.3);}
  .goal.draw::before{background:linear-gradient(90deg,transparent,#ff6b35,transparent);}
  .goal.draw .goal-tag{color:#ff9966;}
  .draw-pool{margin:8px 0 4px;display:flex;flex-direction:column;gap:3px;}
  .draw-pool-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:1px 0;}
  .draw-pool-name{color:var(--text2);font-weight:600;}
  .draw-pool-tickets{color:#ff9966;font-weight:700;}
  /* Vote banner on weekly card */
  .vote-banner{margin-top:8px;padding:5px 10px;border-radius:7px;background:rgba(168,155,255,0.1);border:1px solid rgba(168,155,255,0.25);font-size:10px;color:#a89bff;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
  /* Quest view lucky draw panel */
  .ld-panel{margin:0 32px 12px;padding:14px 16px;background:rgba(255,107,53,0.05);border:1px solid rgba(255,107,53,0.25);border-radius:12px;}
  .ld-panel-title{font-size:13px;font-weight:700;color:#ff9966;margin-bottom:4px;}
  .ld-panel-meta{font-size:11px;color:var(--text2);margin-bottom:10px;}
  .ld-submit{width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#ff6b35,#ff9966);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
  /* Quest view vote panel */
  .vote-panel{margin:0 32px 12px;padding:14px 16px;background:rgba(168,155,255,0.05);border:1px solid rgba(168,155,255,0.25);border-radius:12px;}
  .vote-panel-title{font-size:13px;font-weight:700;color:#a89bff;margin-bottom:10px;}
  .vote-opt-btn{width:100%;padding:11px 16px;border-radius:10px;border:1.5px solid rgba(168,155,255,0.3);background:rgba(20,25,58,0.6);cursor:pointer;display:flex;align-items:center;gap:10px;font-family:inherit;text-align:left;transition:all 0.15s;margin-bottom:7px;}
  .vote-opt-btn:hover{border-color:#a89bff;background:rgba(168,155,255,0.1);}
  .vote-opt-btn.voted{border-color:#a89bff;background:rgba(168,155,255,0.18);}
  .vote-opt-emoji{font-size:22px;flex-shrink:0;}
  .vote-opt-text{font-size:14px;font-weight:600;color:var(--text);flex:1;}
  .vote-opt-check{font-size:16px;color:#a89bff;}

  /* Section labels */
  .sec-lbl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin:18px 28px 10px;display:flex;align-items:center;gap:8px;}
  .sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

  /* Hero cards */
  .hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:0 28px 14px;}
  .hero-card{background:linear-gradient(180deg,rgba(20,25,58,0.7),rgba(10,14,31,0.9));border:1px solid var(--border);border-radius:18px;padding:18px 16px 16px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;backdrop-filter:blur(10px);}
  .hero-card:hover{transform:translateY(-3px);}
  .hero-card-glow{position:absolute;top:0;left:0;right:0;height:2px;}
  .hero-tier{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;background:rgba(0,0,0,0.4);font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
  .hero-edit{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.4);cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:3;}
  .hero-portrait-wrap{display:flex;justify-content:center;margin:8px 0 10px;position:relative;}
  .hero-name{font-family:'Cormorant Garamond',serif;font-size:22px;text-align:center;font-weight:600;}
  .hero-class{font-size:11px;text-align:center;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:2px;}
  .hero-level-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .hero-level-num{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;font-weight:700;}
  .hero-pet{display:flex;align-items:center;gap:6px;margin-top:10px;padding:6px 10px;background:rgba(0,0,0,0.3);border-radius:999px;border:1px solid var(--border);}
  .hero-pet-icon{font-size:18px;}
  .hero-pet-name{font-size:11px;color:var(--text2);font-weight:600;}
  .hero-stars{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:11px;}
  .hero-stars .today{color:var(--gold);font-weight:700;}
  .hero-stars .total{color:var(--text2);}

  /* Personal stars panel */
  .panel{margin:0 28px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;backdrop-filter:blur(10px);}
  .panel-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
  .wpr{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .wpr-name{font-size:13px;font-weight:700;width:90px;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-size:15px;}
  .wpr-track{flex:1;background:rgba(0,0,0,0.4);border-radius:999px;height:7px;overflow:hidden;border:1px solid var(--border);}
  .wpr-fill{height:100%;border-radius:999px;transition:width 0.4s;}
  .wpr-stars{font-size:12px;color:var(--gold);font-weight:700;width:46px;text-align:right;}
  .wpr-hint{font-size:10px;color:var(--text2);margin-left:100px;margin-top:-4px;margin-bottom:6px;}

  /* Activity */
  .activity-card{margin:0 28px 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;backdrop-filter:blur(10px);}
  .ar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
  .ar:last-child{border-bottom:none;}
  .ar-name{font-weight:700;width:80px;flex-shrink:0;}
  .ar-task{flex:1;color:var(--text2);}
  .ar-check{color:var(--green);}
  .ar-time{font-size:10px;color:var(--text3);}

  /* Quest view */
  .qhdr{display:flex;align-items:center;gap:16px;padding:20px 32px;border-bottom:1px solid rgba(0,229,255,0.15);position:relative;z-index:2;}
  .btn-back{padding:8px 14px;border-radius:999px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;}
  .qhdr-info{flex:1;}
  .qhdr-name-row{display:flex;align-items:baseline;gap:10px;}
  .qhdr-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;}
  .qhdr-class{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;}
  .qhdr-level-row{display:flex;align-items:center;gap:12px;margin-top:4px;}
  .qhdr-level{font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}
  .qhdr-bar{width:200px;height:5px;background:rgba(0,0,0,0.4);border-radius:999px;overflow:hidden;}
  .qhdr-bar-fill{height:100%;border-radius:999px;transition:width 0.4s;}
  .qhdr-xp{font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums;}
  .qhdr-stars{text-align:right;}
  .qhdr-stars .n{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--gold);line-height:1;}
  .qhdr-stars .l{font-size:10px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}

  .quest-progress{padding:12px 32px;}
  .quest-progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
  .quest-list{padding:8px 32px 32px;display:flex;flex-direction:column;gap:10px;}
  .quest-list.young{gap:14px;}
  .qi{display:flex;align-items:center;gap:12px;padding:14px 16px;background:linear-gradient(90deg,rgba(20,25,58,0.6),rgba(10,14,31,0.8));border:1px solid var(--border);border-radius:12px;transition:all 0.3s;}
  .qi.done{opacity:0.6;background:rgba(20,25,58,0.3);border-color:rgba(0,229,255,0.25);}
  .qi.flash{animation:questFlash 0.6s ease;}
  .quest-list.young .qi{padding:18px 18px;gap:16px;}
  .qi-emoji{font-size:32px;width:44px;text-align:center;flex-shrink:0;}
  .quest-list.young .qi-emoji{font-size:42px;width:54px;}
  .qi-body{flex:1;min-width:0;}
  .qi-name{font-size:16px;font-weight:600;color:#fff;line-height:1.3;}
  .quest-list.young .qi-name{font-size:19px;font-weight:700;}
  .qi.done .qi-name{text-decoration:line-through;color:var(--text2);}
  .qi-desc{font-size:12px;color:var(--text2);margin-top:3px;}
  .quest-list.young .qi-desc{font-size:14px;}
  .qi-pts{font-size:12px;color:var(--gold);font-weight:600;margin-top:4px;}
  .qi-audio{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,#34d399,#10b981);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;box-shadow:0 0 12px rgba(52,211,153,0.4);}
  .quest-list.young .qi-audio{width:52px;height:52px;font-size:22px;}
  .qi-check{width:52px;height:52px;border-radius:50%;cursor:pointer;flex-shrink:0;font-size:22px;font-weight:800;transition:all 0.2s;background:rgba(0,0,0,0.4);color:transparent;}
  .quest-list.young .qi-check{width:62px;height:62px;font-size:28px;}
  .qi-check.on{background:linear-gradient(135deg,#34d399,#10b981);color:#fff;border:none;box-shadow:0 0 16px rgba(52,211,153,0.5);}

  /* PIN */
  .pin-screen{max-width:320px;margin:60px auto;text-align:center;padding:0 16px;}
  .pin-back{position:absolute;top:24px;left:24px;}
  .pin-screen h2{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--text);margin-bottom:6px;}
  .pin-screen p{font-size:12px;color:var(--text2);margin-bottom:24px;letter-spacing:1px;text-transform:uppercase;}
  .pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
  .pd{width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,0.4);border:1.5px solid var(--border);}
  .pd.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 12px rgba(0,229,255,0.5);}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
  .ppb{padding:14px;font-size:18px;font-weight:600;cursor:pointer;font-family:'Cormorant Garamond',serif;background:rgba(20,25,58,0.6);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);transition:all 0.12s;}
  .ppb:hover{border-color:var(--accent);color:var(--accent);}
  .pin-err{color:var(--red);font-size:12px;margin-top:14px;min-height:18px;font-weight:600;}

  /* Parent Zone */
  .p-layout{display:flex;height:100vh;min-height:600px;}
  .p-nav{width:200px;flex-shrink:0;background:rgba(10,14,31,0.7);border-right:1px solid var(--border);padding:20px 0;backdrop-filter:blur(10px);position:relative;}
  .p-nav-title{padding:0 20px 16px;font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--accent);}
  .pni{padding:11px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all 0.12s;letter-spacing:0.3px;}
  .pni:hover{background:rgba(0,229,255,0.05);color:var(--text);}
  .pni.on{background:rgba(0,229,255,0.08);color:var(--accent);border-right:2px solid var(--accent);}
  .p-exit{position:absolute;bottom:14px;left:14px;right:14px;}
  .p-exit button{width:100%;padding:9px;font-size:12px;border-radius:8px;border:1px solid var(--border);background:rgba(20,25,58,0.6);cursor:pointer;color:var(--text2);font-weight:600;}
  .p-content{flex:1;overflow-y:auto;padding:24px 28px;}
  .ps{display:none;}.ps.on{display:block;}
  .ptitle{font-family:'Cormorant Garamond',serif;font-size:26px;margin-bottom:4px;}
  .psub{font-size:12px;color:var(--text2);margin-bottom:18px;letter-spacing:0.3px;}
  .fi,.fs{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(20,25,58,0.6);font-size:13px;color:var(--text);font-family:inherit;font-weight:500;}
  .fi:focus,.fs:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,0.15);}
  .fl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
  .bp{padding:9px 18px;border-radius:var(--radius-sm);background:linear-gradient(135deg,#0891b2,var(--accent));color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;box-shadow:0 0 14px rgba(0,229,255,0.3);font-family:inherit;}
  .bp:hover{transform:translateY(-1px);box-shadow:0 0 18px rgba(0,229,255,0.5);}
  .bd{padding:6px 12px;border-radius:8px;background:transparent;color:var(--red);border:1px solid var(--red);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
  .bd:hover{background:rgba(240,64,96,0.1);}
  .af{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .af-title{font-family:'Cormorant Garamond',serif;font-size:18px;margin-bottom:12px;}
  .li{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(20,25,58,0.5);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;}
  .ep{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
  .eo{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:rgba(0,0,0,0.3);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
  .eo:hover{border-color:var(--accent);}
  .eo.on{border:1.5px solid var(--accent);background:rgba(0,229,255,0.15);}
  .co{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.12s;}
  .co.on{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.4);}
  .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
  .stc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;}
  .stn{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--accent);font-weight:700;}
  .stl{font-size:11px;color:var(--text2);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
  .rcat{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;}
  .rsug{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(20,25,58,0.5);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;cursor:pointer;}
  .rsug:hover{border-color:var(--accent);}
  .word-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .wchip{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:rgba(20,25,58,0.5);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);}
  .wchip.on{background:rgba(0,229,255,0.15);border-color:var(--accent);color:var(--accent);}
  .ql-age{margin-bottom:14px;}
  .ql-ah{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--accent);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
  .ql-row{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:rgba(20,25,58,0.5);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;}
  .ql-row.expanded{border-color:var(--accent);background:rgba(0,229,255,0.05);}
  .ql-em{font-size:18px;width:24px;text-align:center;flex-shrink:0;margin-top:1px;}
  .ql-body{flex:1;}
  .ql-name{font-size:13px;font-weight:700;}
  .ql-desc{font-size:11px;color:var(--text2);margin-top:1px;}
  .ql-pts{font-size:11px;color:var(--gold);font-weight:700;width:24px;flex-shrink:0;margin-top:1px;}
  .ql-addbtn{font-size:11px;color:#fff;font-weight:600;cursor:pointer;padding:5px 11px;border:none;border-radius:6px;background:linear-gradient(135deg,#0891b2,var(--accent));white-space:nowrap;flex-shrink:0;}
  .ql-addbtn.cancel{background:rgba(0,0,0,0.4);color:var(--text2);border:1px solid var(--border);}
  .ql-fb{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
  .ql-fb button{padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(20,25,58,0.5);font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;}
  .ql-fb button.on{background:rgba(0,229,255,0.15);border-color:var(--accent);color:var(--accent);}
  .assign-panel{margin-top:8px;padding:12px;background:rgba(0,0,0,0.3);border:1px solid var(--accent);border-radius:var(--radius-sm);}
  .assign-label{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
  .assign-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
  .assign-btn{padding:8px 4px;border-radius:8px;border:1.5px solid var(--border);background:rgba(20,25,58,0.6);cursor:pointer;text-align:center;}
  .assign-btn:hover{border-color:var(--accent);}
  .assign-btn.sel{border-color:var(--accent);background:rgba(0,229,255,0.15);}
  .assign-btn .ab-em{font-size:18px;}
  .assign-btn .ab-name{font-size:10px;font-weight:700;margin-top:2px;}

  .reward-slot{background:var(--card);border:1.5px dashed var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .reward-slot.filled{border-style:solid;}
  .rs-num{width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rs-clear{font-size:11px;color:var(--red);cursor:pointer;padding:4px 9px;border-radius:6px;border:1px solid var(--red);background:rgba(240,64,96,0.08);font-weight:600;font-family:inherit;}

  /* Modals */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
  .modal{background:linear-gradient(180deg,#14193a,#0a0e1f);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;margin-bottom:6px;}
  .modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}

  .level-up-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);animation:levelUp 0.5s ease;}
  .level-up{text-align:center;padding:30px;}
  .level-up-glow{font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:float 2s ease-in-out infinite;}
  .level-up-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;margin-top:8px;}
  .level-up-sub{font-size:13px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:8px;}
  .level-up-unlock{margin-top:18px;padding:14px 22px;border:1px solid var(--gold);background:rgba(255,215,0,0.1);border-radius:var(--radius);font-size:14px;color:var(--gold);}
  .level-up-btn{margin-top:24px;padding:11px 28px;border-radius:999px;background:linear-gradient(135deg,#0891b2,var(--accent));color:#fff;border:none;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;}

  .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#10b981,var(--green));color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 24px rgba(52,211,153,0.4);animation:toastIn 0.2s ease;}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  .cb{position:fixed;pointer-events:none;z-index:9999;font-size:24px;animation:confetti 1s forwards;}

  /* Photo upload */
  .photo-drop{margin-top:10px;padding:30px;border:2px dashed var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;background:rgba(0,0,0,0.2);transition:all 0.15s;}
  .photo-drop:hover{border-color:var(--accent);background:rgba(0,229,255,0.05);}
  .photo-drop input{display:none;}

  /* Class picker */
  .class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
  .class-opt{padding:10px;border-radius:8px;border:1.5px solid var(--border);background:rgba(20,25,58,0.5);cursor:pointer;text-align:center;}
  .class-opt:hover{border-color:var(--accent);}
  .class-opt.on{border-color:var(--accent);background:rgba(0,229,255,0.1);}
  .class-opt .g{font-family:'Cormorant Garamond',serif;font-size:24px;}
  .class-opt .n{font-size:11px;font-weight:600;margin-top:2px;letter-spacing:0.5px;text-transform:uppercase;}

  /* Hue slider */
  .hue-slider{width:100%;height:24px;border-radius:999px;background:linear-gradient(90deg,#ff3d6e,#ffd700,#34d399,#00e5ff,#a78bfa,#ff3d6e);cursor:pointer;border:none;outline:none;-webkit-appearance:none;}
  .hue-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--accent);cursor:pointer;}

  /* Skin tones */
  .skin-row{display:flex;gap:8px;margin-top:6px;}
  .skin-opt{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
  .skin-opt.on{border-color:var(--accent);box-shadow:0 0 12px rgba(0,229,255,0.4);}

  /* Pet picker */
  .pet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
  .pet-opt{padding:14px 8px;border-radius:8px;border:1.5px solid var(--border);background:rgba(20,25,58,0.5);cursor:pointer;text-align:center;}
  .pet-opt:hover{border-color:var(--accent);}
  .pet-opt.on{border-color:var(--accent);background:rgba(0,229,255,0.1);}
  .pet-opt .e{font-size:32px;}
  .pet-opt .n{font-size:11px;font-weight:600;margin-top:4px;}

  /* Voice options */
  .vopt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:5px;border:1px solid transparent;}
  .vopt:hover{background:rgba(20,25,58,0.5);}
  .vopt.on{background:rgba(0,229,255,0.1);border-color:var(--accent);}

  /* iPad / smaller screens */
  @media(max-width:1100px){
    .hero-grid{grid-template-columns:repeat(2,1fr);}
    .goals-row{grid-template-columns:1fr;}
  }
  @media(max-width:768px){
    .hdr{padding:14px 18px;}
    .verse,.bday,.goals-row,.sec-lbl,.hero-grid,.panel,.activity-card{margin-left:18px;margin-right:18px;}
    .verse{flex-wrap:wrap;}
    .verse-tag{min-width:auto;}
    .qhdr{flex-wrap:wrap;padding:14px 18px;gap:10px;}
    .qhdr-bar{width:120px;}
    .quest-progress,.quest-list{padding-left:18px;padding-right:18px;}
    .p-nav{width:60px;}
    .p-nav-title,.pni{padding-left:10px;padding-right:10px;font-size:11px;}
    .p-content{padding:16px;}
    .sgrid{grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .stn{font-size:22px;}
  }
  @media(max-width:480px){
    .hero-grid{grid-template-columns:repeat(2,1fr);}
    .qhdr-bar{width:80px;}
    .qhdr-info{min-width:0;flex:1;}
    .sgrid{grid-template-columns:1fr 1fr;gap:6px;}
    .modal{padding:20px 16px;}
    .af{padding:14px;}
  }
  /* ── Rank ribbon on hero cards ──────────────────────────── */
  .hero-rank-ribbon{display:flex;align-items:center;justify-content:center;gap:5px;margin:5px -16px 2px;padding:5px 8px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;position:relative;overflow:hidden;}
  .hero-rank-ribbon::before{content:'';position:absolute;inset:0;background:inherit;opacity:0.12;}
  .hero-rank-name{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,currentColor,rgba(255,255,255,0.8));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hero-rank-dec{font-size:8px;opacity:0.7;}
  .hero-streak-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(0,0,0,0.35);border:1px solid rgba(255,165,0,0.3);}
  @keyframes rankShimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
  /* ── Scripture verse block (overlays) ───────────────────── */
  .verse-overlay{margin-top:16px;padding:14px 18px;border-left:2px solid var(--gold);background:linear-gradient(90deg,rgba(255,215,0,0.08),transparent);border-radius:0 8px 8px 0;text-align:left;}
  .verse-overlay-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:#f0eccc;line-height:1.5;margin-bottom:6px;}
  .verse-overlay-ref{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;}
  /* ── Streak overlay large number ────────────────────────── */
  .streak-big{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:700;line-height:1;background:linear-gradient(135deg,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  /* ── Holiday mode badge ─────────────────────────────────── */
  .holiday-ribbon{position:absolute;top:0;left:0;right:0;background:linear-gradient(90deg,rgba(0,229,255,0.15),rgba(52,211,153,0.15));border-bottom:1px solid rgba(0,229,255,0.3);font-size:10px;font-weight:700;color:var(--accent);text-align:center;padding:3px;letter-spacing:1px;z-index:2;}
  /* ── Hero Profile Modal ─────────────────────────────────── */
  @keyframes profileIn{from{opacity:0;transform:scale(0.97) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .profile-bg{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:2000;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;backdrop-filter:blur(10px);animation:profileIn 0.28s ease;}
  .profile-modal{width:100%;max-width:460px;min-height:100vh;background:linear-gradient(180deg,#14193a 0%,#0a0e1f 40%,#050818 100%);position:relative;}
  .profile-close-btn{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.45);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:5;line-height:1;}
  .profile-banner{padding:28px 20px 22px;text-align:center;position:relative;}
  .profile-pet-display{font-size:60px;line-height:1;margin-bottom:14px;animation:float 2.5s ease-in-out infinite;display:inline-block;}
  .profile-hero-name{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;line-height:1.1;margin-bottom:10px;}
  .profile-rank-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:5px;}
  .profile-rank-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .profile-rank-dec{font-size:10px;opacity:0.6;}
  .profile-next-rank{font-size:11px;color:var(--text2);letter-spacing:0.5px;margin-bottom:14px;}
  .profile-xp-bar{height:4px;border-radius:999px;background:rgba(0,0,0,0.5);overflow:hidden;margin:0 32px 18px;border:1px solid rgba(255,255,255,0.06);}
  .profile-xp-fill{height:100%;border-radius:999px;transition:width 0.5s;}
  .profile-quest-btn{display:block;width:calc(100% - 48px);margin:0 24px;padding:13px;border-radius:999px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:0.5px;}
  /* Stats strip */
  .profile-stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px 16px 0;}
  .profile-stat-pill{background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 6px;text-align:center;}
  .psp-val{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;line-height:1.1;}
  .psp-lbl{font-size:9px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:3px;}
  /* Profile sections */
  .profile-section{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.05);}
  .profile-section-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;margin-bottom:3px;display:flex;justify-content:space-between;align-items:baseline;}
  .profile-section-sub{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:12px;}
  /* Starfield */
  .starfield-wrap{overflow-x:auto;padding-bottom:4px;}
  .sf-legend{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:10px;color:var(--text3);}
  .sf-legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;}
  /* Top quests */
  .tq-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
  .tq-row:last-child{border-bottom:none;}
  .tq-medal{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
  .tq-name{flex:1;font-size:13px;font-weight:600;}
  .tq-count{font-size:12px;color:var(--text2);flex-shrink:0;}
  /* Placeholder section */
  .profile-placeholder{padding:14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.08);text-align:center;font-size:12px;color:var(--text3);}
  /* ── Parent chore accordion & chips ────────────────────── */
  .kid-acc{border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.025);}
  .kid-acc-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;}
  .kid-acc-hdr:hover{background:rgba(255,255,255,0.04);}
  .kid-acc-body{padding:0 8px 8px;}
  .cc-add-btn{margin-left:auto;padding:3px 10px;border-radius:999px;background:rgba(0,229,255,0.08);border:1px solid var(--accent);color:var(--accent);font-size:10px;font-weight:700;cursor:pointer;}
  .cc-row{padding:7px 8px;gap:8px;}
  .cc-name{font-size:12px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cc-name-done{text-decoration:line-through;color:var(--text3);}
  .cc-chips{display:flex;gap:4px;margin-top:3px;}
  .cc{padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text3);transition:all 0.15s;white-space:nowrap;}
  .cc:hover{background:rgba(255,255,255,0.1);}
  .cc-am{background:rgba(255,200,50,0.12);border-color:rgba(255,200,50,0.35);color:#ffc832;}
  .cc-pm{background:rgba(130,100,255,0.15);border-color:rgba(130,100,255,0.4);color:#b09fff;}
  .cc-school{background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.35);color:#34d399;}
  .cc-noschool{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.35);color:#fbbf24;}
  .cc-pts{font-size:11px;color:var(--gold);font-weight:700;flex-shrink:0;}
  .cc-del{width:24px;height:24px;border-radius:50%;border:1px solid rgba(240,64,96,0.35);background:rgba(240,64,96,0.06);color:var(--red);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cc-edit{width:24px;height:24px;border-radius:50%;border:1px solid rgba(0,229,255,0.3);background:rgba(0,229,255,0.06);color:var(--accent);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cc-all{width:24px;height:24px;border-radius:50%;border:1px solid rgba(160,130,255,0.3);background:rgba(160,130,255,0.06);color:#c4b5fd;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cc-move-col{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
  .cc-move{width:18px;height:12px;border-radius:3px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:var(--text3);cursor:pointer;font-size:7px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}

function load(){
  try{const s=localStorage.getItem('fdv10');if(s){ST=JSON.parse(s);ensureFields();return;}}catch(e){}
  ST=defaultState();save();
}
function save(){try{localStorage.setItem('fdv10',JSON.stringify(ST));}catch(e){}}
function ensureFields(){
  // Backward-fill any missing fields in case of older state
  ST.members=ST.members||[];
  ST.chores=ST.chores||[];
  ST.rewards=ST.rewards||[null,null,null];
  ST.grandRewards=ST.grandRewards||[null,null,null];
  ST.weeklyStars=ST.weeklyStars||{};
  if(!ST.luckyDraw)ST.luckyDraw={prizes:[null,null,null],entries:{},history:[]};
  if(!ST.luckyDraw.prizes)ST.luckyDraw.prizes=[null,null,null];
  if(!ST.luckyDraw.entries)ST.luckyDraw.entries={};
  if(!ST.luckyDraw.history)ST.luckyDraw.history=[];
  if(!ST.weeklyVote)ST.weeklyVote={options:[null,null,null],votes:{},active:false};
  if(!ST.weeklyVote.options)ST.weeklyVote.options=[null,null,null];
  if(!ST.weeklyVote.votes)ST.weeklyVote.votes={};
  for(const m of (ST.members||[]).filter(x=>!x.isParent)){if(m.starBalance===undefined)m.starBalance=0;}
  ST.history=ST.history||[];
  ST.personalRewards=ST.personalRewards||[];
  ST.monthlyStarsAccum=ST.monthlyStarsAccum||0;
  ST.monthlyStarTarget=ST.monthlyStarTarget||480;
  ST.grandStarTarget=ST.grandStarTarget||2000;
  ST.threshold=ST.threshold||80;
  ST.taskWord=ST.taskWord||'Quest';
  if(ST.soundEnabled===undefined)ST.soundEnabled=true;
  ST.customChores=ST.customChores||[];
  ST.rewardLibrary=ST.rewardLibrary||[];
  ST.lastResetDay=ST.lastResetDay||'';
  ST.streaks=ST.streaks||{};
  ST.badges=ST.badges||{};
  if(!ST.cumulativeStars){ST.cumulativeStars={};}
  if(!ST.completedCount){ST.completedCount={};}
  // Seed cumulative stars and completed count from XP for existing members (one-time migration)
  for(const m of (ST.members||[]).filter(x=>!x.isParent)){
    if(ST.cumulativeStars[m.id]===undefined)ST.cumulativeStars[m.id]=m.xp||0;
    if(ST.completedCount[m.id]===undefined)ST.completedCount[m.id]=Math.round((m.xp||0)/1.5);
  }
  ST.dailyHistory=ST.dailyHistory||{};
  ST.holidayMode=ST.holidayMode||{active:false,endsOn:null};
  if(!ST.holidayMode.tripName)ST.holidayMode.tripName='';
  if(!ST.holidayMode.categories)ST.holidayMode.categories=HOLIDAY_CATS.map(c=>c.id);
  if(!ST.holidayMode.questsPerDay)ST.holidayMode.questsPerDay=3;
  ST.holidayQuests=ST.holidayQuests||[];
  ST.holidayQuestDate=ST.holidayQuestDate||'';
  // Migrate existing chores with new scheduling fields
  for(const c of (ST.chores||[])){
    if(!c.timeTag)c.timeTag='any';
    if(c.schoolDay===undefined)c.schoolDay=null;
  }
  ST.pendingChests=ST.pendingChests||{};
  ST.chestsOpened=ST.chestsOpened||{};
  // Silent badge migration: pre-grant earned badges for existing members so
  // they don't receive a flood of overlays on first post-update quest
  for(const m of (ST.members||[]).filter(x=>!x.isParent)){
    if(!ST.badges[m.id]){
      ST.badges[m.id]=[];
      for(const b of BADGES){try{if(b.check(m.id))ST.badges[m.id].push(b.id);}catch(e){}}
    }
  }
}

function calcAge(dob){const t=new Date(),b=new Date(dob);let a=t.getFullYear()-b.getFullYear();const m=t.getMonth()-b.getMonth();if(m<0||(m===0&&t.getDate()<b.getDate()))a--;return a;}
function isBday(dob){if(!dob)return false;const t=new Date(),b=new Date(dob);return t.getMonth()===b.getMonth()&&t.getDate()===b.getDate();}
function isYoung(id){const m=ST.members.find(x=>x.id===id);return m&&calcAge(m.dob)<=7;}
function tw(){return ST.taskWord||'Quest';}
function dayOfYear(){const n=new Date();return Math.floor((n-new Date(n.getFullYear(),0,0))/86400000);}
function weekKey(){const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(new Date().setDate(diff)).toISOString().slice(0,10);}
function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// XP / level math
function xpForLevel(level){return 4*level*(level-1);}
function levelFromXp(xp){let lvl=1;while(xpForLevel(lvl+1)<=xp)lvl++;return lvl;}
function xpProgress(xp){const lvl=levelFromXp(xp);const cur=xpForLevel(lvl);const next=xpForLevel(lvl+1);return{level:lvl,cur,next,inLevel:xp-cur,needed:next-cur,pct:((xp-cur)/(next-cur))*100};}
function tierFor(level){let t=TIERS[0];for(const tt of TIERS)if(level>=tt.lvl)t=tt;return t;}
function petStage(level){
  if(level<3)return 0; // egg
  if(level<5)return 1; // baseline
  if(level<10)return 2; // sparkle
  if(level<15)return 3; // aura
  if(level<25)return 4; // form
  if(level<50)return 5; // mythic
  return 6; // awakened
}
function getPet(member){const list=PETS[member.classId]||PETS.scout;return list.find(p=>p.id===member.petId)||list[0];}

/* ── Holiday Quest helpers ─────────────────────────────────────────────── */
function simpleHash(str){let h=5381;for(let i=0;i<str.length;i++)h=((h<<5)+h)^str.charCodeAt(i);return h>>>0;}
function seededShuffle(arr,seed){
  const a=[...arr];let s=seed;
  const rand=()=>{s=(Math.imul(s,1664525)+1013904223)>>>0;return s/0x100000000;};
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function generateHolidayQuests(){
  const kids=ST.members.filter(m=>!m.isParent);
  const today=new Date().toDateString(); // local date — must match chkDay()
  const qpd=Math.max(1,ST.holidayMode.questsPerDay||3);
  const activeCatIds=ST.holidayMode.categories||HOLIDAY_CATS.map(c=>c.id);
  const pool=[];
  for(const cat of HOLIDAY_CATS){
    if(!activeCatIds.includes(cat.id))continue;
    for(const q of cat.quests)pool.push({...q,catId:cat.id,catEmoji:cat.emoji});
  }
  if(!pool.length){ST.holidayQuests=[];ST.holidayQuestDate=today;return;}
  const quests=[];
  for(const kid of kids){
    const seed=simpleHash(today+kid.id);
    const selected=seededShuffle(pool,seed).slice(0,Math.min(qpd,pool.length));
    for(const q of selected){
      quests.push({id:'hq_'+kid.id+'_'+q.id,name:q.n,desc:q.d,emoji:q.e,catId:q.catId,catEmoji:q.catEmoji,assignee:kid.id,points:3,done:false,hq:true,chestRolled:false});
    }
  }
  ST.holidayQuests=quests;
  ST.holidayQuestDate=today;
}
function ensureHolidayQuests(){
  if(!ST.holidayMode?.active){if((ST.holidayQuests||[]).length){ST.holidayQuests=[];ST.holidayQuestDate='';save();}return;}
  const today=new Date().toDateString(); // local date — must match chkDay()
  if(ST.holidayQuestDate===today&&(ST.holidayQuests||[]).length>0)return;
  generateHolidayQuests();save();
}
function unlocksFor(level){return UNLOCKS.filter(u=>level>=u.lvl);}
function nextUnlockFor(level){return UNLOCKS.find(u=>u.lvl>level);}

function chkWeek(){const wk=weekKey();if(ST.currentWeek!==wk){ST.weeklyStars={};ST.currentWeek=wk;if(ST.weeklyVote)ST.weeklyVote.votes={};save();}}
function chkMonth(){const now=new Date();const mk=now.getFullYear()+'-'+(now.getMonth()+1);if(ST.currentMonth!==mk){ST.monthlyStarsAccum=0;ST.currentMonth=mk;save();}}
function chkDay(){
  const today=new Date().toDateString();
  if(ST.lastResetDay===today)return;
  // Auto-deactivate holiday mode if end date passed
  if(ST.holidayMode?.active&&ST.holidayMode.endsOn&&new Date()>new Date(ST.holidayMode.endsOn)){
    ST.holidayMode.active=false;
  }
  // Process streaks before resetting chores
  const yest=yesterdayStr();
  const lastDay=ST.lastResetDay?new Date(ST.lastResetDay):null;
  const today2=new Date();
  const gapDays=lastDay?daysBetween(lastDay,today2):99;
  const kids=(ST.members||[]).filter(m=>!m.isParent);
  const pendingMilestones=[];
  for(const kid of kids){
    if(!ST.streaks[kid.id])ST.streaks[kid.id]={current:0,best:0,lastDay:''};
    const str=ST.streaks[kid.id];
    if(ST.holidayMode?.active){
      // Holiday: freeze streaks, don't break them
    } else if(gapDays>1){
      // Missed multiple days — reset streak
      str.current=0;
    } else {
      // Normal day transition — check if yesterday had activity
      const didAnything=((ST.dailyHistory[kid.id]||{})[yest]||0)>0;
      if(didAnything){
        str.current=(str.current||0)+1;
        if(str.current>(str.best||0))str.best=str.current;
        if(STREAK_MILESTONES.includes(str.current)){
          pendingMilestones.push({kid,streak:str.current});
        }
      } else {
        str.current=0;
      }
      str.lastDay=yest;
    }
  }
  // Prune dailyHistory older than 365 days
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-365);
  const cutoffStr=dateStr(cutoff);
  for(const kidId of Object.keys(ST.dailyHistory||{})){
    for(const d of Object.keys(ST.dailyHistory[kidId]||{})){
      if(d<cutoffStr)delete ST.dailyHistory[kidId][d];
    }
  }
  ST.chores.forEach(c=>{c.done=false;c.chestRolled=false;});
  if(ST.holidayMode?.active)generateHolidayQuests();
  else{ST.holidayQuests=[];ST.holidayQuestDate='';}
  ST.lastResetDay=today;
  save();
  if(pendingMilestones.length){
    window._streakMilestoneQueue=[...pendingMilestones];
    setTimeout(()=>showNextStreakMilestone(),800);
  }
}
function totalStars(){return Math.floor((ST.members||[]).filter(m=>!m.isParent).reduce((s,m)=>s+(m.xp||0),0));}
function memberStars(id){const m=ST.members.find(x=>x.id===id);return m?m.xp||0:0;}
function dateStr(d){d=d||new Date();return d.toISOString().slice(0,10);}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return dateStr(d);}
function daysBetween(a,b){return Math.round((b-a)/(1000*60*60*24));}
function rankFor(classId,level){const ranks=CLASS_RANKS[classId]||CLASS_RANKS.scout;let idx=0;for(let i=0;i<RANK_LEVELS.length;i++){if(level>=RANK_LEVELS[i])idx=i;}return{name:ranks[idx],next:ranks[idx+1]||null,nextLvl:RANK_LEVELS[idx+1]||null};}
function isSchoolDay(){

function toggleHolidayCategory(catId){
  const cats=ST.holidayMode.categories||HOLIDAY_CATS.map(c=>c.id);
  const idx=cats.indexOf(catId);
  if(idx>=0){if(cats.length<=1){alert('At least one category must be active.');return;}cats.splice(idx,1);}
  else cats.push(catId);
  ST.holidayMode.categories=cats;
  generateHolidayQuests();save();renderParent();
}

function cycleChoreTime(id){

  const seq=['any','morning','evening'];
  c.timeTag=seq[(seq.indexOf(c.timeTag||'any')+1)%seq.length];

function cycleChoreSchool(id){
  const c=ST.chores.find(x=>x.id===id);if(!c)return;
  // null → true → false → null
  c.schoolDay=c.schoolDay===null?true:c.schoolDay===true?false:null;

function rollChest(){let roll=Math.random()*100,acc=0;for(const t of CHEST_TYPES){acc+=t.weight;if(roll<acc){const lo=t.stars[0],hi=t.stars[1];const stars=lo+Math.floor(Math.random()*(hi-lo+1));return{id:'c'+Date.now()+'_'+Math.floor(Math.random()*9999),type:t.id,stars};}}return{id:'c'+Date.now(),type:'common',stars:10};}

function petDisplay(member){

/* ---------- 5. AUDIO + VOICE ---------- */
function getACtx(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return audioCtx;}
function playChime(){if(!ST.soundEnabled)return;const ctx=getACtx();if(!ctx)return;[523.25,659.25,783.99].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(0.18/(i+1),ctx.currentTime+0.01+i*0.06);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.2+i*0.1);o.start(ctx.currentTime+i*0.06);o.stop(ctx.currentTime+1.5);});}
function loadVoices(){if(!window.speechSynthesis)return;voices=speechSynthesis.getVoices();if(!voices.length)speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();pickBest();};else pickBest();}
function pickBest(){if(ST.selectedVoiceName){const f=voices.find(v=>v.name===ST.selectedVoiceName);if(f){selVoice=f;return;}}const pref=['Samantha','Karen','Moira','Tessa','Fiona','Ava','Allison'];for(const n of pref){const v=voices.find(x=>x.name===n);if(v){selVoice=v;break;}}if(!selVoice){const en=voices.filter(v=>v.lang.startsWith('en'));selVoice=en[0]||voices[0]||null;}}
function speak(txt,young){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);if(selVoice)u.voice=selVoice;u.rate=young?0.78:0.9;u.pitch=young?1.2:1.0;u.volume=1;speechSynthesis.speak(u);}
function speakVerse(){const v=V[(dayOfYear()-1)%V.length];if(v)speak(v.t+' — '+v.r,false);}

/* ---------- 6. SCREEN ROUTING ---------- */
function show(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.getElementById('sc-'+id).classList.add('on');if(id==='home')renderHome();if(id==='quests')renderQuestView();if(id==='pin')renderPin();if(id==='parent')renderParent();window.scrollTo(0,0);}
function showPin(){pinBuf='';show('pin');}
function pp(v){if(v==='c')pinBuf='';else if(v==='d')pinBuf=pinBuf.slice(0,-1);else if(pinBuf.length<4)pinBuf+=v;updPD();if(pinBuf.length===4){setTimeout(()=>{if(pinBuf===ST.pin){show('parent');pinBuf='';}else{const e=document.getElementById('pin-err');if(e)e.textContent='Incorrect PIN.';pinBuf='';updPD();}},200);}}
function updPD(){for(let i=0;i<4;i++){const el=document.getElementById('pd'+i);if(el)el.classList.toggle('on',i<pinBuf.length);}}

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2400);}

function showToast(msg,duration=2200){
  const old=document.getElementById('app-toast');if(old)old.remove();
  const t=document.createElement('div');t.id='app-toast';t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),duration);
}

function confettiBurst(x,y){const em=['⭐','✨','🌟','💫','🎉','🏆','⚔️','🐉','🌸'];for(let i=0;i<10;i++){const el=document.createElement('div');el.className='cb';el.textContent=em[Math.floor(Math.random()*em.length)];el.style.left=(x+(Math.random()-0.5)*100)+'px';el.style.top=(y+(Math.random()-0.5)*50)+'px';el.style.animationDelay=(Math.random()*0.35)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),1300);}}

function togQ(cid,e){
  const c=ST.chores.find(x=>x.id===cid)||(ST.holidayQuests||[]).find(x=>x.id===cid);if(!c)return;
  const m=ST.members.find(x=>x.id===curKid);if(!m)return;
  if(!c.done){
    c.done=true;
    const oldLevel=levelFromXp(m.xp||0);
    const oldRank=rankFor(m.classId,oldLevel).name;
    m.xp=(m.xp||0)+c.points;
    m.starBalance=(m.starBalance||0)+c.points;
    const newLevel=levelFromXp(m.xp);
    const newRank=rankFor(m.classId,newLevel).name;
    if(!ST.weeklyStars[curKid])ST.weeklyStars[curKid]=0;
    ST.weeklyStars[curKid]+=c.points;
    ST.monthlyStarsAccum=(ST.monthlyStarsAccum||0)+c.points;
    // Track per-day history for Starfield and streaks
    const tod=dateStr();
    if(!ST.dailyHistory[curKid])ST.dailyHistory[curKid]={};
    ST.dailyHistory[curKid][tod]=(ST.dailyHistory[curKid][tod]||0)+1;
    // Cumulative stars (never resets)
    if(!ST.cumulativeStars[curKid])ST.cumulativeStars[curKid]=0;
    ST.cumulativeStars[curKid]+=c.points;
    // Total quests completed counter (never resets)
    if(!ST.completedCount[curKid])ST.completedCount[curKid]=0;
    ST.completedCount[curKid]++;
    ST.history.unshift({name:m.name,chore:c.name,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),kidId:curKid,date:tod});
    if(ST.history.length>100)ST.history.pop();
    playChime();
    if(e&&e.clientX)confettiBurst(e.clientX,e.clientY);
    // Chest drop roll — only once per chore per day (chestRolled flag prevents re-roll exploit)
    let droppedChest=null;
    if(!c.chestRolled&&Math.random()<CHEST_DROP_CHANCE){
      droppedChest=rollChest();
      if(!ST.pendingChests[curKid])ST.pendingChests[curKid]=[];
      ST.pendingChests[curKid].push(droppedChest);
    }
    c.chestRolled=true;
    // Check badges (reads updated state; saves happen below)
    checkBadges(curKid);
    save();
    if(newLevel>oldLevel){showLevelUp(m,newLevel,oldRank!==newRank?newRank:null);return;}
    if(droppedChest){showChestOverlay(m,droppedChest);return;}
    drainBadgeQueue();
    return;
  } else {
    c.done=false;
    m.xp=Math.max(0,(m.xp||0)-c.points);
    m.starBalance=Math.max(0,(m.starBalance||0)-c.points);
    if(ST.weeklyStars[curKid])ST.weeklyStars[curKid]=Math.max(0,ST.weeklyStars[curKid]-c.points);
    ST.monthlyStarsAccum=Math.max(0,(ST.monthlyStarsAccum||0)-c.points);
    save();
  }
  renderQuestView();
}

function enterLuckyDraw(amount){
  const m=ST.members.find(x=>x.id===curKid);if(!m)return;
  amount=parseInt(amount)||0;
  if(amount<=0||amount>(m.starBalance||0)){toast('Not enough stars!');return;}
  m.starBalance=Math.max(0,(m.starBalance||0)-amount);
  if(!ST.luckyDraw.entries)ST.luckyDraw.entries={};
  ST.luckyDraw.entries[curKid]=(ST.luckyDraw.entries[curKid]||0)+amount;
  save();
  renderQuestView();
  toast('🎟️ '+(amount===1?'1 ticket':''+amount+' tickets')+' entered!');
}
function runLuckyDraw(){
  const prizes=(ST.luckyDraw.prizes||[]).filter(p=>p);
  if(!prizes.length){toast('Add at least one prize first!');return;}
  const entries=ST.luckyDraw.entries||{};
  const pool=[];
  for(const[id,tickets]of Object.entries(entries)){for(let i=0;i<tickets;i++)pool.push(id);}
  if(!pool.length){toast('No entries yet — kids need to spend stars!');return;}
  const winnerId=pool[Math.floor(Math.random()*pool.length)];
  const winner=ST.members.find(m=>m.id===winnerId);
  const prize=prizes[Math.floor(Math.random()*prizes.length)];
  if(!ST.luckyDraw.history)ST.luckyDraw.history=[];
  ST.luckyDraw.history.unshift({date:new Date().toLocaleDateString(),winnerId,winnerName:winner?.name||'Unknown',prize,totalEntries:pool.length});
  if(ST.luckyDraw.history.length>10)ST.luckyDraw.history.pop();
  ST.luckyDraw.entries={};
  save();
  showDrawWinner(winner,prize);
  renderParentGoals();
}

function triggerChestOpen(kidId,chestId){
  const wrap=document.getElementById('chest-art-wrap');
  if(!wrap||wrap.dataset.opening)return;
  wrap.dataset.opening='1';
  wrap.style.cursor='default';
  wrap.onclick=null;
  const chestList=ST.pendingChests[kidId]||[];
  const chest=chestList.find(x=>x.id===chestId);
  if(!chest)return;
  const t=CHEST_TYPES.find(x=>x.id===chest.type)||CHEST_TYPES[0];
  // Shake
  wrap.classList.add('chest-shaking');
  setTimeout(()=>{
    wrap.classList.remove('chest-shaking');
    // Swap to open SVG
    document.getElementById('chest-art').innerHTML=chestSVG(chest.type,true);
    document.getElementById('chest-tap-hint').style.display='none';
    // Spawn star particles
    const pc=document.getElementById('chest-particles');
    if(pc){
      const n=Math.min(16,chest.stars);
      let pHTML='';
      for(let i=0;i<n;i++){
        const angle=(i/n)*360;
        const dist=50+Math.random()*40;
        const tx=Math.cos(angle*Math.PI/180)*dist;
        const ty=Math.sin(angle*Math.PI/180)*dist-30;
        const delay=(Math.random()*0.35).toFixed(2);
        pHTML+=`<span class="star-particle" style="--tx:${tx.toFixed(0)}px;--ty:${ty.toFixed(0)}px;--delay:${delay}s;color:${t.color};">★</span>`;
      }
      pc.innerHTML=pHTML;
    }
    playChime();
    setTimeout(()=>{
      const rew=document.getElementById('chest-reward');
      if(rew){rew.style.display='';rew.style.animation='rewardReveal 0.4s ease';}
    },700);
  },420);
}
function collectChest(kidId,chestId,stars){
  const m=ST.members.find(x=>x.id===kidId);if(!m)return;
  // Remove chest from pending
  if(ST.pendingChests[kidId])ST.pendingChests[kidId]=ST.pendingChests[kidId].filter(c=>c.id!==chestId);
  // Award stars
  const oldLevel=levelFromXp(m.xp||0);
  const oldRank=rankFor(m.classId,oldLevel).name;
  m.xp=(m.xp||0)+stars;
  m.starBalance=(m.starBalance||0)+stars;
  const newLevel=levelFromXp(m.xp);
  const newRank=rankFor(m.classId,newLevel).name;
  ST.cumulativeStars[kidId]=(ST.cumulativeStars[kidId]||0)+stars;
  if(!ST.weeklyStars[kidId])ST.weeklyStars[kidId]=0;
  ST.weeklyStars[kidId]+=stars;
  ST.monthlyStarsAccum=(ST.monthlyStarsAccum||0)+stars;
  // Track for Treasure Hunter badge
  ST.chestsOpened[kidId]=(ST.chestsOpened[kidId]||0)+1;
  checkBadges(kidId);
  save();
  playChime();
  confettiBurst(window.innerWidth/2,window.innerHeight/3);
  document.getElementById('modal-host').innerHTML='';
  if(newLevel>oldLevel){showLevelUp(m,newLevel,oldRank!==newRank?newRank:null);return;}
  drainBadgeQueue();
}
